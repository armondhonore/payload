application:
  name: payload
  pods:
  - name: app
    image: node:20-alpine
    path: /
    servicePorts:
    - 3000
    vars:
      PAYLOAD_SECRET: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      DATABASE_URI: "mongodb://mongo.pod:27017/payload"
      NEXT_PUBLIC_SERVER_URL: "https://relaxed-weasel-payload.cloud.nexlayer.ai"
    volumes:
    - name: payload-uploads
      mountPath: /app/public/media
      size: 5Gi
  - name: mongo
    image: mongo:5
    servicePorts:
    - 27017
    volumes:
    - name: payload-mongo
      mountPath: /data/db
      size: 5Gi
