application:
  name: payload
  pods:
  - name: app
    image: "# filled by pipeline"
    path: /
    servicePorts:
    - 3000
    vars:
      PAYLOAD_SECRET: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      DATABASE_URL: "mongodb://payload-mongo.pod:27017/payload"
      DATABASE_URI: "mongodb://payload-mongo.pod:27017/payload"
      NEXT_PUBLIC_SERVER_URL: "https://relaxed-weasel-payload.cloud.nexlayer.ai"
  - name: payload-mongo
    image: mongo:6
    servicePorts:
    - 27017
    volumes:
    - name: payload-mongo
      mountPath: /data/db
      size: 5Gi
